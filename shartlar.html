<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Foydalanish shartlari — Kalki.uz</title>
<meta name="description" content="Kalki.uz saytidan foydalanish shartlari. Условия использования сайта Kalki.uz.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cat:#1A2B24;--accent:#D99A2B;--cat-text:#C9D6CE;--paper:#F7F8F6;--card:#FFFFFF;--ink:#16211C;--muted:#5C6B63;--line:#DDE5E0;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:0 16px 48px}
header{background:var(--cat);color:#fff;padding:22px 16px 30px;min-height:120px}
header .wrap{padding-bottom:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cat-text);text-decoration:none}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lang-seg{display:flex;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;gap:3px}
.lang-seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:800;color:var(--cat-text);padding:6px 12px;border-radius:7px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lang-seg button.on{background:#fff;color:var(--cat)}
h1{font-size:25px;font-weight:800;line-height:1.2}
main{padding-top:24px;font-size:15px}
main h2{font-size:18px;font-weight:800;margin:22px 0 8px}
main p{margin-bottom:10px}
main ul{margin:0 0 10px 20px}
main li{margin-bottom:6px}
footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
</style>
<script src="ga.js" defer></script>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:image" content="https://kalki.uz/og-image.png">
</head>
<body>
<header>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="./"><span class="brand-dot"></span>Kalki.uz</a>
      <div class="lang-seg"><button type="button" id="langUz" class="on">UZ</button><button type="button" id="langRu">RU</button></div>
    </div>
    <h1 data-i="h1"></h1>
  </div>
</header>
<main class="wrap" id="content"></main>
<script>
(function(){
  var I={
    uz:{h1:"Foydalanish shartlari",body:'<p><em>Oxirgi yangilanish: 2026-yil iyul</em></p>'
      +'<h2>1. Xizmat tavsifi</h2><p>Kalki.uz — bepul onlayn kalkulyatorlar va hujjat shablonlari to\u2018plami. Saytdan foydalanish orqali siz ushbu shartlarga rozilik bildirasiz.</p>'
      +'<h2>2. Hisob-kitoblar faqat ma\u2019lumot uchun</h2><p>Barcha kalkulyatorlar natijalari <b>taxminiy bo\u2018lib, faqat ma\u2019lumot uchun</b> mo\u2018ljallangan. Ular rasmiy moliyaviy, yuridik, tibbiy yoki diniy maslahat hisoblanmaydi. Muhim qarorlar (kredit olish, mashina olib kirish, soliq to\u2018lash, sog\u2018liq masalalari) oldidan tegishli mutaxassis yoki rasmiy organga murojaat qiling.</p>'
      +'<h2>3. Aniqlik to\u2018g\u2018risida</h2><p>Biz stavkalar va formulalarni dolzarb saqlashga intilamiz, lekin qonunchilik va tariflar o\u2018zgarib turadi. Sayt ma\u2019lumotlarning mutlaq aniqligini kafolatlamaydi va hisob-kitob natijalari asosida qabul qilingan qarorlar uchun javobgar emas.</p>'
      +'<h2>4. Shablonlar</h2><p>Yuklab olinadigan hujjat shablonlari umumiy namunalar bo\u2018lib, yuridik hujjat kuchiga ega emas. Muhim bitimlar oldidan hujjatni yurist bilan ko\u2018rib chiqing. Shablonlardan shaxsiy va tijorat maqsadlarida bepul foydalanish mumkin, lekin ularni o\u2018z nomingizdan ommaviy tarqatish taqiqlanadi.</p>'
      +'<h2>5. Intellektual mulk</h2><p>Sayt dizayni, kodi va kontenti Kalki.uz (Achchi loyihasi) ga tegishli. Saytga havola berish mumkin va rag\u2018batlantiriladi; kontentni to\u2018liq nusxalash taqiqlanadi.</p>'
      +'<h2>6. Reklama</h2><p>Saytda uchinchi tomon reklamasi (masalan, Google AdSense) ko\u2018rsatilishi mumkin. Reklama mazmuni uchun reklama beruvchilar javobgar.</p>'
      +'<h2>7. Aloqa</h2><p>Takliflar va xatolar bo\u2018yicha: sayt pastidagi «Aloqa» havolasi orqali Telegram\u2019da yozing.</p>'},
    ru:{h1:"Условия использования",body:'<p><em>Последнее обновление: июль 2026</em></p>'
      +'<h2>1. Описание сервиса</h2><p>Kalki.uz — коллекция бесплатных онлайн-калькуляторов и шаблонов документов. Используя сайт, вы соглашаетесь с настоящими условиями.</p>'
      +'<h2>2. Расчёты носят справочный характер</h2><p>Все результаты калькуляторов <b>приблизительны и предназначены только для справки</b>. Они не являются официальной финансовой, юридической, медицинской или религиозной консультацией. Перед важными решениями (кредит, ввоз авто, налоги, здоровье) обращайтесь к специалисту или в официальный орган.</p>'
      +'<h2>3. О точности</h2><p>Мы стремимся поддерживать ставки и формулы актуальными, но законодательство и тарифы меняются. Сайт не гарантирует абсолютную точность и не несёт ответственности за решения, принятые на основе расчётов.</p>'
      +'<h2>4. Шаблоны</h2><p>Скачиваемые шаблоны — общие образцы, не имеющие силы юридического документа. Перед важными сделками проверьте документ с юристом. Шаблоны можно бесплатно использовать в личных и коммерческих целях, но запрещено их массовое распространение от своего имени.</p>'
      +'<h2>5. Интеллектуальная собственность</h2><p>Дизайн, код и контент сайта принадлежат Kalki.uz (проект Achchi). Ссылки на сайт приветствуются; полное копирование контента запрещено.</p>'
      +'<h2>6. Реклама</h2><p>На сайте может показываться сторонняя реклама (например, Google AdSense). За содержание рекламы отвечают рекламодатели.</p>'
      +'<h2>7. Контакты</h2><p>Предложения и ошибки: пишите в Telegram по ссылке «Контакты» внизу сайта.</p>'}
  };
  var lang='uz';
  function apply(){
    document.documentElement.lang=lang;
    document.querySelector('[data-i="h1"]').textContent=I[lang].h1;
    document.getElementById('content').innerHTML=I[lang].body;
    document.getElementById('langUz').classList.toggle('on',lang==='uz');
    document.getElementById('langRu').classList.toggle('on',lang==='ru');
  }
  document.getElementById('langUz').onclick=function(){lang='uz';apply()};
  document.getElementById('langRu').onclick=function(){lang='ru';apply()};
  apply();
})();
</script>
</body>
</html>
