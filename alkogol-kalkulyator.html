<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alkogol kalkulyatori — qondagi alkogol miqdorini hisoblash</title>
<meta name="description" content="Alkogol kalkulyatori: bir necha ichimlik, och/to'q qorin hisobi bilan qondagi taxminiy promille va chiqib ketish vaqti. Алкогольный калькулятор.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body[data-cat="hayot"]{--cat:#5B3A63;--cat-deep:#452B4B;--accent:#D98BA6;--cat-soft:#F3EDF5;--cat-text:#D9C6DE}
:root{--paper:#F7F8F6;--card:#FFFFFF;--ink:#16211C;--muted:#5C6B63;--line:#DDE5E0;--radius:14px;--warn:#B3261E;--warn-soft:#FBEAE8}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 48px}
header{background:var(--cat);color:#fff;padding:22px 16px 68px;position:relative}
header .wrap{padding-bottom:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cat-text)}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lang-seg{display:flex;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;gap:3px}
.lang-seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:800;color:var(--cat-text);padding:6px 12px;border-radius:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:.04em}
.lang-seg button.on{background:#fff;color:var(--cat)}
.cat-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.13);color:#fff;padding:5px 11px;border-radius:99px;margin-bottom:12px}
.cat-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
h1{font-size:26px;font-weight:800;line-height:1.2;letter-spacing:-.01em}
.sub{margin-top:8px;font-size:14.5px;color:var(--cat-text);max-width:42ch}
.warnbar{background:var(--warn-soft);border:1.5px solid #E8C2BE;border-radius:12px;padding:12px 14px;margin-top:16px;font-size:13.5px;font-weight:700;color:var(--warn)}
.form-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px 22px;margin-top:16px;box-shadow:0 6px 24px rgba(0,0,0,.10);position:relative}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.02em}
.input-shell{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;background:#FBFCFB;transition:border-color .15s;overflow:hidden}
.input-shell:focus-within{border-color:var(--cat)}
input[type=text]{flex:1;border:0;outline:0;background:transparent;font:inherit;font-size:17px;font-weight:700;color:var(--ink);padding:12px 13px;min-width:0}
select{flex:1;border:0;outline:0;background:transparent;font:inherit;font-size:15px;font-weight:700;color:var(--ink);padding:12px 10px;min-width:0;-webkit-appearance:none;appearance:none}
.unit{font-size:12.5px;font-weight:700;color:var(--muted);padding:0 11px;white-space:nowrap;border-left:1px solid var(--line);align-self:stretch;display:flex;align-items:center;background:#F2F5F3}
.seg{display:flex;background:#EEF2EF;border-radius:10px;padding:4px;gap:4px}
.seg button{flex:1;border:0;background:transparent;font:inherit;font-size:14px;font-weight:700;color:var(--muted);padding:10px 8px;border-radius:8px;cursor:pointer;transition:background .15s,color .15s;-webkit-tap-highlight-color:transparent}
.seg button.on{background:var(--cat);color:#fff}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}
.drink-row{border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#FBFCFB}
.drink-top{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.drink-top .input-shell{flex:1;background:#fff}
.drink-del{border:0;background:var(--warn-soft);color:var(--warn);font:inherit;font-size:16px;font-weight:800;width:42px;height:42px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.drink-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px}
.drink-grid .input-shell{background:#fff}
.add-btn{width:100%;border:1.5px dashed var(--cat);background:var(--cat-soft);color:var(--cat);font:inherit;font-size:14px;font-weight:800;padding:12px;border-radius:11px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.calc-btn{width:100%;margin-top:22px;background:var(--cat);color:#fff;border:0;border-radius:12px;font:inherit;font-size:17px;font-weight:800;padding:16px;cursor:pointer;transition:background .15s,transform .05s;-webkit-tap-highlight-color:transparent}
.calc-btn:active{transform:scale(.985);background:var(--cat-deep)}
.receipt{margin-top:26px;display:none;filter:drop-shadow(0 10px 24px rgba(0,0,0,.14))}
.receipt.show{display:block;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.receipt.show{animation:none}}
.receipt-body{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:22px 20px 18px}
.receipt-tag{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px}
.receipt-tag::after{content:"";flex:1;height:1px;background:var(--line)}
.big-figure{margin-top:12px}
.big-figure .num{font-size:34px;font-weight:800;letter-spacing:-.02em;color:var(--cat);line-height:1.15}
.big-figure .lbl{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:3px}
.receipt-rows{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px}
.rrow{display:flex;justify-content:space-between;gap:12px;font-size:14.5px;padding:6px 0}
.rrow .k{color:var(--muted);font-weight:600}
.rrow .v{font-weight:800;text-align:right}
.rrow .v.accent{color:var(--accent)}
.result-warn{margin-top:14px;background:var(--warn-soft);border-radius:10px;padding:11px 13px;font-size:13px;font-weight:700;color:var(--warn)}
.receipt-edge{height:14px;background:radial-gradient(circle at 8px -4px, transparent 8px, var(--card) 8.5px);background-size:22px 14px;background-repeat:repeat-x}
.seo{margin-top:36px;font-size:15px;color:#33403A}
.seo h2{font-size:18px;font-weight:800;color:var(--ink);margin:22px 0 8px}
.seo p{margin-bottom:10px}
footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
</style>
</head>
<body data-cat="hayot">

<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span><span data-i="brand"></span></div>
      <div class="lang-seg" role="group" aria-label="Til / Язык">
        <button type="button" id="langUz" class="on">UZ</button>
        <button type="button" id="langRu">RU</button>
      </div>
    </div>
    <span class="cat-badge" data-i="cat"></span>
    <h1 data-i="h1"></h1>
    <p class="sub" data-i="sub"></p>
  </div>
</header>

<main class="wrap">
  <div class="warnbar" data-i="topWarn"></div>

  <section class="form-card">
    <div class="field">
      <label data-i="lGender"></label>
      <div class="seg">
        <button type="button" id="gM" class="on" data-i="segM"></button>
        <button type="button" id="gF" data-i="segF"></button>
      </div>
    </div>
    <div class="field">
      <label for="weight" data-i="lWeight"></label>
      <div class="input-shell">
        <input type="text" id="weight" inputmode="numeric" value="80" autocomplete="off">
        <span class="unit">kg</span>
      </div>
    </div>
    <div class="field">
      <label data-i="lStomach"></label>
      <div class="seg">
        <button type="button" id="stEmpty" class="on" data-i="segEmpty"></button>
        <button type="button" id="stFull" data-i="segFull"></button>
      </div>
      <p class="hint" data-i="hStomach"></p>
    </div>
    <div class="field">
      <label data-i="lDrinks"></label>
      <div id="drinksBox"></div>
      <button type="button" class="add-btn" id="addDrink" data-i="btnAdd"></button>
      <p class="hint" data-i="hDrinks"></p>
    </div>
    <div class="field" style="margin-bottom:0">
      <label for="hours" data-i="lHours"></label>
      <div class="input-shell">
        <input type="text" id="hours" inputmode="decimal" value="0" autocomplete="off">
        <span class="unit" data-i="uHours"></span>
      </div>
      <p class="hint" data-i="hHours"></p>
    </div>
    <button type="button" class="calc-btn" id="calcBtn" data-i="btnCalc"></button>
  </section>

  <section class="receipt" id="receipt" aria-live="polite">
    <div class="receipt-body">
      <div class="receipt-tag" data-i="rTag"></div>
      <div class="big-figure">
        <div class="num" id="mainNum">—</div>
        <div class="lbl" data-i="lblMain"></div>
      </div>
      <div class="receipt-rows">
        <div class="rrow"><span class="k" data-i="kDrinks"></span><span class="v" id="rDrinks">—</span></div>
        <div class="rrow"><span class="k" data-i="kAlc"></span><span class="v" id="rAlc">—</span></div>
        <div class="rrow"><span class="k" data-i="kState"></span><span class="v" id="rState">—</span></div>
        <div class="rrow"><span class="k" data-i="kZero"></span><span class="v accent" id="rZero">—</span></div>
      </div>
      <div class="result-warn" data-i="resWarn"></div>
    </div>
    <div class="receipt-edge"></div>
  </section>

  <section class="seo" id="seoBlock"></section>
  <footer data-i="foot"></footer>
</main>

<script>
(function(){
  var PRESETS=[
    {id:'beer', s:5,   v:500},
    {id:'wine', s:12,  v:150},
    {id:'champ',s:11,  v:150},
    {id:'vodka',s:40,  v:100},
    {id:'cognac',s:40, v:100},
    {id:'whisky',s:40, v:100},
    {id:'custom',s:0,  v:100}
  ];
  var I={
    uz:{
      brand:"Kalki.uz",cat:"Hayotiy",
      h1:"Alkogol kalkulyatori",
      sub:"Bir necha xil ichimlik, qorin holati va o'tgan vaqtni hisobga olib, qondagi taxminiy promilleni bilib oling.",
      topWarn:"⚠️ O'zbekistonda mast holda haydashga mutlaqo yo'l qo'yilmaydi (nol toleranslik). Bu kalkulyator faqat ma'lumot uchun — undan rulga o'tirish mumkinligini aniqlash uchun FOYDALANMANG. Ichdingizmi — haydamang.",
      lGender:"Jins",segM:"Erkak",segF:"Ayol",
      lWeight:"Vazn",
      lStomach:"Qorin holati",
      segEmpty:"Och qoringa",segFull:"To'q qoringa",
      hStomach:"To'q qoringa ichilganda alkogol sekinroq va kamroq so'riladi — cho'qqi ko'rsatkich ~30% past bo'ladi.",
      lDrinks:"Ichimliklar",
      drinkNames:{beer:"Pivo",wine:"Vino",champ:"Shampan",vodka:"Aroq",cognac:"Konyak",whisky:"Viski",custom:"Boshqa"},
      btnAdd:"+ Ichimlik qo'shish",
      hDrinks:"Aralashtirib ichilgan bo'lsa, har birini alohida qator qilib qo'shing (5 tagacha).",
      volLbl:"hajm",strLbl:"kuchlilik",
      lHours:"Birinchi qadahdan beri o'tgan vaqt",uHours:"soat",
      hHours:"Ichish boshlangan paytdan hozirgacha.",
      btnCalc:"Hisoblash",rTag:"Hisob natijasi",
      lblMain:"Qondagi taxminiy alkogol",
      kDrinks:"Ichimliklar soni",kAlc:"Jami sof spirt",kState:"Holat",kZero:"To'liq chiqib ketishi",
      states:["Hushyor","Yengil ta'sir","Mastlik","Kuchli mastlik","Xavfli zaharlanish"],
      zeroNow:"chiqib bo'lgan",hoursShort:"soat",
      resWarn:"Bu o'rtacha formula (Vidmark) bo'yicha taxmin. Haqiqiy ko'rsatkich yoshga, sog'liqqa, dori-darmonlarga qarab sezilarli farq qiladi. Hech qachon bu raqamga tayanib rulga o'tirmang.",
      foot:"Vidmark formulasi, chiqish tezligi ~0,15‰/soat, to'q qorin koeffitsiyenti 0,7. Faqat ma'lumot uchun.",
      seo:'<h2>Aralash ichimliklar qanday hisoblanadi?</h2><p>Har bir ichimlikdagi sof spirt massasi alohida hisoblanadi (hajm × kuchlilik × 0,789) va jamlanadi. Qondagi ko\'rsatkich uchun ichimlik turi emas, jami sof spirt muhim — lekin aralashtirish o\'zini his qilishni og\'irlashtiradi.</p><h2>Och va to\'q qorin farqi qancha?</h2><p>To\'q qoringa ichilganda alkogol oshqozondan sekinroq o\'tadi va bir qismi jigar orqali birinchi aylanishdayoq parchalanadi — cho\'qqi promille o\'rtacha 20–40% pastroq bo\'ladi. Kalkulyator 30% o\'rtacha qiymatni oladi.</p><h2>O\'zbekistonda qonun nima deydi?</h2><p>Mast holda transport boshqarish qat\'iyan taqiqlangan — yo\'l qo\'yiladigan chegara yo\'q. Jarima, huquqdan mahrum qilish va jinoiy javobgarlikkacha chora ko\'riladi. Ichgan bo\'lsangiz — taksi chaqiring.</p>'
    },
    ru:{
      brand:"Kalki.uz",cat:"Жизнь",
      h1:"Алкогольный калькулятор",
      sub:"Учитывает несколько напитков, состояние желудка и прошедшее время — примерное промилле в крови.",
      topWarn:"⚠️ В Узбекистане вождение в нетрезвом виде полностью запрещено (нулевая толерантность). Калькулятор носит справочный характер — НЕ используйте его, чтобы решить, можно ли за руль. Выпили — не садитесь за руль.",
      lGender:"Пол",segM:"Мужчина",segF:"Женщина",
      lWeight:"Вес",
      lStomach:"Состояние желудка",
      segEmpty:"Натощак",segFull:"На сытый желудок",
      hStomach:"На сытый желудок алкоголь всасывается медленнее и меньше — пик примерно на 30% ниже.",
      lDrinks:"Напитки",
      drinkNames:{beer:"Пиво",wine:"Вино",champ:"Шампанское",vodka:"Водка",cognac:"Коньяк",whisky:"Виски",custom:"Другое"},
      btnAdd:"+ Добавить напиток",
      hDrinks:"Если смешивали — добавьте каждый напиток отдельной строкой (до 5).",
      volLbl:"объём",strLbl:"крепость",
      lHours:"Прошло с первой рюмки",uHours:"часов",
      hHours:"С момента начала употребления.",
      btnCalc:"Рассчитать",rTag:"Результат расчёта",
      lblMain:"Примерный алкоголь в крови",
      kDrinks:"Напитков",kAlc:"Всего чистого спирта",kState:"Состояние",kZero:"Полное выведение",
      states:["Трезв","Лёгкое влияние","Опьянение","Сильное опьянение","Опасное отравление"],
      zeroNow:"уже выведен",hoursShort:"ч.",
      resWarn:"Это оценка по усреднённой формуле Видмарка. Реальный показатель заметно зависит от возраста, здоровья и лекарств. Никогда не садитесь за руль, опираясь на эту цифру.",
      foot:"Формула Видмарка, выведение ~0,15‰/час, коэффициент сытого желудка 0,7. Только для справки.",
      seo:'<h2>Как считаются смешанные напитки?</h2><p>Масса чистого спирта в каждом напитке считается отдельно (объём × крепость × 0,789) и суммируется. Для промилле важен не тип напитка, а суммарный спирт — но смешивание усиливает субъективное опьянение.</p><h2>Какова разница между натощак и сытым желудком?</h2><p>На сытый желудок алкоголь медленнее проходит в кишечник, часть расщепляется при первом прохождении через печень — пик промилле в среднем на 20–40% ниже. Калькулятор берёт среднее значение 30%.</p><h2>Что говорит закон в Узбекистане?</h2><p>Управление транспортом в нетрезвом виде строго запрещено — допустимого порога нет. Предусмотрены штраф, лишение прав и вплоть до уголовной ответственности. Выпили — вызовите такси.</p>'
    }
  };

  var lang='uz', gender='m', stomach='empty', drinks=[], calcData=null;
  var num=function(s){return parseFloat(String(s).replace(/[^\d.,]/g,'').replace(',','.'))||0};
  var $=function(id){return document.getElementById(id)};
  var t=function(k){return I[lang][k]};

  function addDrinkRow(preset){
    if(drinks.length>=5)return;
    drinks.push({type:preset||'beer'});
    renderDrinks();
  }

  function renderDrinks(){
    var box=$('drinksBox');
    var old=[];
    var rows=box.querySelectorAll('.drink-row');
    for(var i=0;i<rows.length;i++){
      old.push({
        type:rows[i].querySelector('select').value,
        vol:rows[i].querySelector('.d-vol').value,
        str:rows[i].querySelector('.d-str').value
      });
    }
    var html='';
    for(var j=0;j<drinks.length;j++){
      var d=old[j]||null;
      var type=d?d.type:drinks[j].type;
      var p=PRESETS.filter(function(x){return x.id===type})[0]||PRESETS[0];
      var vol=d?d.vol:p.v;
      var str=d?d.str:(p.s||5);
      var opts='';
      for(var k=0;k<PRESETS.length;k++){
        opts+='<option value="'+PRESETS[k].id+'"'+(PRESETS[k].id===type?' selected':'')+'>'+t('drinkNames')[PRESETS[k].id]+(PRESETS[k].s?' '+PRESETS[k].s+'%':'')+'</option>';
      }
      html+='<div class="drink-row" data-idx="'+j+'">'
        +'<div class="drink-top">'
        +'<div class="input-shell"><select>'+opts+'</select></div>'
        +(drinks.length>1?'<button type="button" class="drink-del" aria-label="remove">\u00D7</button>':'')
        +'</div>'
        +'<div class="drink-grid">'
        +'<div class="input-shell"><input type="text" class="d-vol" inputmode="numeric" value="'+vol+'"><span class="unit">ml</span></div>'
        +'<div class="input-shell"><input type="text" class="d-str" inputmode="decimal" value="'+str+'"><span class="unit">%</span></div>'
        +'</div></div>';
    }
    box.innerHTML=html;
    var newRows=box.querySelectorAll('.drink-row');
    for(var m=0;m<newRows.length;m++){
      (function(row){
        row.querySelector('select').addEventListener('change',function(){
          var p=PRESETS.filter(function(x){return x.id===this.value},this)[0];
          for(var q=0;q<PRESETS.length;q++){if(PRESETS[q].id===this.value){p=PRESETS[q]}}
          if(p&&p.s){row.querySelector('.d-str').value=p.s}
          if(p){row.querySelector('.d-vol').value=p.v}
        });
        var del=row.querySelector('.drink-del');
        if(del){del.onclick=function(){
          drinks.splice(parseInt(row.getAttribute('data-idx'),10),1);
          renderDrinks();
        }}
      })(newRows[m]);
    }
  }

  function applyLang(){
    document.documentElement.lang=lang;
    var els=document.querySelectorAll('[data-i]');
    for(var i=0;i<els.length;i++){els[i].textContent=t(els[i].getAttribute('data-i'))}
    $('seoBlock').innerHTML=t('seo');
    $('langUz').classList.toggle('on',lang==='uz');
    $('langRu').classList.toggle('on',lang==='ru');
    renderDrinks();
    if(calcData)renderResult();
  }
  $('langUz').onclick=function(){lang='uz';applyLang()};
  $('langRu').onclick=function(){lang='ru';applyLang()};

  function setSeg(a,b){a.classList.add('on');b.classList.remove('on')}
  $('gM').onclick=function(){gender='m';setSeg(this,$('gF'))};
  $('gF').onclick=function(){gender='f';setSeg(this,$('gM'))};
  $('stEmpty').onclick=function(){stomach='empty';setSeg(this,$('stFull'))};
  $('stFull').onclick=function(){stomach='full';setSeg(this,$('stEmpty'))};
  $('addDrink').onclick=function(){addDrinkRow()};

  function calc(){
    var W=num($('weight').value), H=num($('hours').value);
    if(!W){$('receipt').classList.remove('show');return}
    var rows=$('drinksBox').querySelectorAll('.drink-row');
    var alcG=0, cnt=0;
    for(var i=0;i<rows.length;i++){
      var v=num(rows[i].querySelector('.d-vol').value);
      var s=num(rows[i].querySelector('.d-str').value);
      if(v&&s){alcG+=v*s/100*0.789;cnt++}
    }
    if(!alcG){$('receipt').classList.remove('show');return}
    var r=gender==='m'?0.7:0.6;
    var absorb=stomach==='full'?0.7:1.0;
    var peak=alcG*absorb/(r*W);
    var now=Math.max(0,peak-0.15*H);
    calcData={alcG:alcG,cnt:cnt,now:now,hoursToZero:now/0.15};
    renderResult();
    $('receipt').classList.add('show');
  }

  function stateIdx(p){
    if(p<0.3)return 0;
    if(p<0.5)return 1;
    if(p<1.5)return 2;
    if(p<3)return 3;
    return 4;
  }

  function renderResult(){
    var d=calcData;
    $('mainNum').textContent='\u2248 '+d.now.toFixed(2).replace('.',',')+' \u2030';
    $('rDrinks').textContent=d.cnt;
    $('rAlc').textContent=Math.round(d.alcG)+' g';
    $('rState').textContent=t('states')[stateIdx(d.now)];
    if(d.now<=0.01){$('rZero').textContent=t('zeroNow')}
    else{
      var h=Math.floor(d.hoursToZero), m=Math.round((d.hoursToZero-h)*60);
      $('rZero').textContent='\u2248 '+h+' '+t('hoursShort')+' '+(m>0?m+' min':'');
    }
  }

  $('calcBtn').onclick=calc;

  addDrinkRow('beer');
  applyLang();
  calc();
})();
</script>
</body>
</html>
