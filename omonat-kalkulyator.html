<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Omonat kalkulyatori — depozit daromadini onlayn hisoblash</title>
<meta name="description" content="Omonat (depozit) kalkulyatori: foiz daromadi, kapitalizatsiya va oylik to'ldirish bilan hisoblang. Депозитный калькулятор онлайн.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body[data-cat="moliya"]{--cat:#0E3B2E;--cat-deep:#092A21;--accent:#D99A2B;--cat-soft:#EAF3EE;--cat-text:#BFD9CC}
body[data-cat="qurilish"]{--cat:#8C3B2A;--cat-deep:#6B2C1F;--accent:#D9A96B;--cat-soft:#F6EDE8;--cat-text:#E8C9BE}
body[data-cat="kommunal"]{--cat:#1D4E6B;--cat-deep:#143A52;--accent:#6FB3D9;--cat-soft:#E8F1F6;--cat-text:#BBD6E6}
body[data-cat="hayot"]{--cat:#5B3A63;--cat-deep:#452B4B;--accent:#D98BA6;--cat-soft:#F3EDF5;--cat-text:#D9C6DE}
:root{--paper:#F7F8F6;--card:#FFFFFF;--ink:#16211C;--muted:#5C6B63;--line:#DDE5E0;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 48px}
header{background:var(--cat);color:#fff;padding:22px 16px 68px;position:relative}
header .wrap{padding-bottom:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cat-text)}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lang-seg{display:flex;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;gap:3px}
.lang-seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:800;color:var(--cat-text);padding:6px 12px;border-radius:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:.04em}
.lang-seg button.on{background:#fff;color:var(--cat)}
.lang-seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.cat-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.13);color:#fff;padding:5px 11px;border-radius:99px;margin-bottom:12px}
.cat-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
h1{font-size:26px;font-weight:800;line-height:1.2;letter-spacing:-.01em}
.sub{margin-top:8px;font-size:14.5px;color:var(--cat-text);max-width:42ch}
.form-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px 22px;margin-top:-44px;box-shadow:0 6px 24px rgba(0,0,0,.10);position:relative}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.02em}
.input-shell{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;background:#FBFCFB;transition:border-color .15s;overflow:hidden}
.input-shell:focus-within{border-color:var(--cat)}
input[type=text]{flex:1;border:0;outline:0;background:transparent;font:inherit;font-size:19px;font-weight:700;color:var(--ink);padding:13px 14px;min-width:0}
.unit{font-size:13px;font-weight:700;color:var(--muted);padding:0 14px;white-space:nowrap;border-left:1px solid var(--line);align-self:stretch;display:flex;align-items:center;background:#F2F5F3}
.seg{display:flex;background:#EEF2EF;border-radius:10px;padding:4px;gap:4px}
.seg button{flex:1;border:0;background:transparent;font:inherit;font-size:14px;font-weight:700;color:var(--muted);padding:10px 8px;border-radius:8px;cursor:pointer;transition:background .15s,color .15s;-webkit-tap-highlight-color:transparent}
.seg button.on{background:var(--cat);color:#fff}
.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}
.calc-btn{width:100%;margin-top:22px;background:var(--cat);color:#fff;border:0;border-radius:12px;font:inherit;font-size:17px;font-weight:800;padding:16px;cursor:pointer;transition:background .15s,transform .05s;-webkit-tap-highlight-color:transparent}
.calc-btn:active{transform:scale(.985);background:var(--cat-deep)}
.calc-btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.receipt{margin-top:26px;display:none;filter:drop-shadow(0 10px 24px rgba(0,0,0,.14))}
.receipt.show{display:block;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.receipt.show{animation:none}}
.receipt-body{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:22px 20px 18px}
.receipt-tag{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px}
.receipt-tag::after{content:"";flex:1;height:1px;background:var(--line)}
.big-figure{margin-top:12px}
.big-figure .num{font-size:32px;font-weight:800;letter-spacing:-.02em;color:var(--cat);line-height:1.15;word-break:break-word}
.big-figure .lbl{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:3px}
.receipt-rows{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px}
.rrow{display:flex;justify-content:space-between;gap:12px;font-size:14.5px;padding:6px 0}
.rrow .k{color:var(--muted);font-weight:600}
.rrow .v{font-weight:800;text-align:right}
.rrow .v.accent{color:var(--accent)}
.receipt-edge{height:14px;background:radial-gradient(circle at 8px -4px, transparent 8px, var(--card) 8.5px);background-size:22px 14px;background-repeat:repeat-x}
.receipt-actions{display:flex;gap:10px;margin-top:16px}
.receipt-actions button{flex:1;border:1.5px solid var(--line);background:var(--card);font:inherit;font-size:14px;font-weight:700;color:var(--cat);padding:12px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.receipt-actions button:active{background:var(--cat-soft)}
.receipt-actions button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.sched{margin-top:26px;display:none}
.sched.show{display:block}
.sched h2{font-size:17px;font-weight:800;margin-bottom:12px}
.tbl-shell{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--cat-soft);color:var(--cat);font-size:11.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:10px 8px;text-align:right}
thead th:first-child{text-align:center;width:44px}
tbody td{padding:9px 8px;text-align:right;border-top:1px solid #EFF3F0;font-weight:600;font-variant-numeric:tabular-nums}
tbody td:first-child{text-align:center;color:var(--muted);font-weight:700}
tbody tr:nth-child(even){background:#FAFBFA}
.more-btn{width:100%;border:0;background:var(--cat-soft);color:var(--cat);font:inherit;font-size:14px;font-weight:800;padding:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.seo{margin-top:36px;font-size:15px;color:#33403A}
.seo h2{font-size:18px;font-weight:800;color:var(--ink);margin:22px 0 8px}
.seo p{margin-bottom:10px}
footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
</style>
</head>
<body data-cat="moliya">

<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span><span data-i="brand"></span></div>
      <div class="lang-seg" role="group" aria-label="Til / Язык">
        <button type="button" id="langUz" class="on">UZ</button>
        <button type="button" id="langRu">RU</button>
      </div>
    </div>
    <span class="cat-badge" data-i="cat"></span>
    <h1 data-i="h1"></h1>
    <p class="sub" data-i="sub"></p>
  </div>
</header>

<main class="wrap">
  <section class="form-card">
    <div class="field">
      <label for="amount" data-i="lAmount"></label>
      <div class="input-shell">
        <input type="text" id="amount" inputmode="numeric" value="20 000 000" autocomplete="off">
        <span class="unit" data-i="uSum"></span>
      </div>
    </div>
    <div class="field">
      <label for="rate" data-i="lRate"></label>
      <div class="input-shell">
        <input type="text" id="rate" inputmode="decimal" value="20" autocomplete="off">
        <span class="unit" data-i="uRate"></span>
      </div>
      <p class="hint" data-i="hRate"></p>
    </div>
    <div class="field">
      <label for="term" data-i="lTerm"></label>
      <div class="input-shell">
        <input type="text" id="term" inputmode="numeric" value="12" autocomplete="off">
        <span class="unit" data-i="uMonths"></span>
      </div>
    </div>
    <div class="field">
      <label for="monthly" data-i="lMonthly"></label>
      <div class="input-shell">
        <input type="text" id="monthly" inputmode="numeric" value="0" autocomplete="off">
        <span class="unit" data-i="uSum2"></span>
      </div>
      <p class="hint" data-i="hMonthly"></p>
    </div>
    <div class="field" style="margin-bottom:0">
      <label data-i="lCap"></label>
      <div class="seg">
        <button type="button" id="capYes" class="on" data-i="segCapYes"></button>
        <button type="button" id="capNo" data-i="segCapNo"></button>
      </div>
      <p class="hint" id="capHint"></p>
    </div>
    <button type="button" class="calc-btn" id="calcBtn" data-i="btnCalc"></button>
  </section>

  <section class="receipt" id="receipt" aria-live="polite">
    <div class="receipt-body">
      <div class="receipt-tag" data-i="rTag"></div>
      <div class="big-figure">
        <div class="num" id="mainNum">—</div>
        <div class="lbl" data-i="lblFinal"></div>
      </div>
      <div class="receipt-rows">
        <div class="rrow"><span class="k" data-i="kDeposited"></span><span class="v" id="rDeposited">—</span></div>
        <div class="rrow"><span class="k" data-i="kEarned"></span><span class="v accent" id="rEarned">—</span></div>
        <div class="rrow"><span class="k" data-i="kYield"></span><span class="v" id="rYield">—</span></div>
        <div class="rrow"><span class="k" data-i="kTerm"></span><span class="v" id="rTerm">—</span></div>
      </div>
      <div class="receipt-actions">
        <button type="button" id="shareBtn" data-i="btnShare"></button>
        <button type="button" id="schedBtn" data-i="btnSched"></button>
      </div>
    </div>
    <div class="receipt-edge"></div>
  </section>

  <section class="sched" id="sched">
    <h2 data-i="schedH"></h2>
    <div class="tbl-shell">
      <table>
        <thead><tr>
          <th data-i="thN"></th><th data-i="thStart"></th><th data-i="thInt"></th><th data-i="thAdd"></th><th data-i="thEnd"></th>
        </tr></thead>
        <tbody id="schedBody"></tbody>
      </table>
      <button type="button" class="more-btn" id="moreBtn"></button>
    </div>
  </section>

  <section class="seo" id="seoBlock"></section>
  <footer data-i="foot"></footer>
</main>

<script>
(function(){
  var I={
    uz:{
      brand:"Kalki.uz",cat:"Moliya",
      h1:"Omonat kalkulyatori",
      sub:"Omonatingiz qancha daromad keltirishini hisoblang — kapitalizatsiya va oylik to'ldirish bilan.",
      lAmount:"Omonat summasi",uSum:"so'm",uSum2:"so'm/oy",
      lRate:"Yillik foiz stavkasi",uRate:"% yillik",
      hRate:"So'mdagi omonatlar odatda 18–24% yillik atrofida.",
      lTerm:"Muddat",uMonths:"oy",
      lMonthly:"Oylik qo'shib borish (ixtiyoriy)",
      hMonthly:"Har oy omonatga qo'shadigan summangiz. Yo'q bo'lsa 0 qoldiring.",
      lCap:"Foizlar kapitalizatsiyasi",
      segCapYes:"Bor",segCapNo:"Yo'q",
      hintCapYes:"Foizlar har oy omonatga qo'shilib, o'zi ham foiz keltiradi — daromad ko'proq.",
      hintCapNo:"Foizlar har oy alohida to'lanadi, omonat o'zgarmaydi.",
      btnCalc:"Hisoblash",rTag:"Hisob natijasi",lblFinal:"Muddat oxiridagi jami summa",
      kDeposited:"Jami qo'yilgan pul",kEarned:"Foiz daromadi",kYield:"Samarali daromadlilik",kTerm:"Muddat",
      months:"oy",btnShare:"Ulashish",btnSched:"Oylik jadval",copied:"Nusxalandi ✓",
      schedH:"Omonat o'sish jadvali",
      thN:"Oy",thStart:"Boshida",thInt:"Foiz",thAdd:"Qo'shildi",thEnd:"Oxirida",
      moreShow:"Barchasini ko'rsatish",moreHide:"Yig'ish",
      shareTitle:"Omonat hisobi",
      foot:"Hisob-kitob ma'lumot uchun. Aniq shartlarni bankdan oling.",
      seo:'<h2>Omonat kalkulyatori nimani hisoblaydi?</h2><p>Qo\'ygan summangiz, foiz stavkasi va muddat asosida muddat oxirida qancha pul olishingizni, sof foiz daromadingizni va samarali yillik daromadlilikni hisoblaydi.</p><h2>Kapitalizatsiya nima va nega muhim?</h2><p>Kapitalizatsiyada har oy hisoblangan foiz omonatga qo\'shiladi va keyingi oy o\'zi ham foiz keltiradi ("foizga foiz"). Uzoq muddatda bu sezilarli farq beradi — ikkala rejimni solishtirib ko\'ring.</p><h2>Qaysi omonat foydaliroq?</h2><p>Faqat stavkaga qaramang: kapitalizatsiya bor-yo\'qligi, to\'ldirish imkoniyati va muddatidan oldin yechish shartlari ham muhim. Kalkulyatorda turli banklar shartlarini kiritib, yakuniy summani solishtiring.</p>'
    },
    ru:{
      brand:"Kalki.uz",cat:"Финансы",
      h1:"Депозитный калькулятор",
      sub:"Рассчитайте доход по вкладу — с капитализацией и ежемесячным пополнением.",
      lAmount:"Сумма вклада",uSum:"сум",uSum2:"сум/мес",
      lRate:"Годовая ставка",uRate:"% годовых",
      hRate:"Вклады в сумах обычно под 18–24% годовых.",
      lTerm:"Срок",uMonths:"мес.",
      lMonthly:"Ежемесячное пополнение (необязательно)",
      hMonthly:"Сумма, которую добавляете каждый месяц. Если нет — оставьте 0.",
      lCap:"Капитализация процентов",
      segCapYes:"Есть",segCapNo:"Нет",
      hintCapYes:"Проценты ежемесячно прибавляются к вкладу и сами приносят доход — итог больше.",
      hintCapNo:"Проценты выплачиваются отдельно каждый месяц, вклад не растёт.",
      btnCalc:"Рассчитать",rTag:"Результат расчёта",lblFinal:"Итоговая сумма в конце срока",
      kDeposited:"Всего вложено",kEarned:"Доход по процентам",kYield:"Эффективная доходность",kTerm:"Срок",
      months:"мес.",btnShare:"Поделиться",btnSched:"Помесячный график",copied:"Скопировано ✓",
      schedH:"График роста вклада",
      thN:"Мес.",thStart:"В начале",thInt:"Проценты",thAdd:"Пополнение",thEnd:"В конце",
      moreShow:"Показать все",moreHide:"Свернуть",
      shareTitle:"Расчёт вклада",
      foot:"Расчёт носит справочный характер. Точные условия уточняйте в банке.",
      seo:'<h2>Что рассчитывает депозитный калькулятор?</h2><p>По сумме вклада, ставке и сроку калькулятор определяет итоговую сумму, чистый процентный доход и эффективную годовую доходность.</p><h2>Что такое капитализация и почему это важно?</h2><p>При капитализации начисленные проценты ежемесячно прибавляются к вкладу и в следующем месяце сами приносят доход («проценты на проценты»). На длинном сроке разница заметна — сравните оба режима.</p><h2>Какой вклад выгоднее?</h2><p>Смотрите не только на ставку: важны капитализация, возможность пополнения и условия досрочного снятия. Введите условия разных банков и сравните итоговые суммы.</p>'
    }
  };

  var lang='uz', cap=true, rows=[], expanded=false, calcData=null;
  var fmt=function(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00A0')};
  var num=function(s){return parseFloat(String(s).replace(/[^\d.,]/g,'').replace(',','.'))||0};
  var $=function(id){return document.getElementById(id)};
  var t=function(k){return I[lang][k]};

  function applyLang(){
    document.documentElement.lang=lang;
    var els=document.querySelectorAll('[data-i]');
    for(var i=0;i<els.length;i++){els[i].textContent=t(els[i].getAttribute('data-i'))}
    $('capHint').textContent=cap?t('hintCapYes'):t('hintCapNo');
    $('seoBlock').innerHTML=t('seo');
    $('langUz').classList.toggle('on',lang==='uz');
    $('langRu').classList.toggle('on',lang==='ru');
    if(calcData){renderResult();renderRows()}
  }
  $('langUz').onclick=function(){lang='uz';applyLang()};
  $('langRu').onclick=function(){lang='ru';applyLang()};

  function liveFmt(el){
    el.addEventListener('input',function(){
      var v=this.value.replace(/[^\d]/g,'');
      this.value=v?fmt(parseInt(v,10)):(this.id==='monthly'?'0':'');
    });
  }
  liveFmt($('amount'));liveFmt($('monthly'));

  function setSeg(a,b){a.classList.add('on');b.classList.remove('on')}
  $('capYes').onclick=function(){cap=true;$('capHint').textContent=t('hintCapYes');setSeg(this,$('capNo'))};
  $('capNo').onclick=function(){cap=false;$('capHint').textContent=t('hintCapNo');setSeg(this,$('capYes'))};

  function calc(){
    var P=num($('amount').value), yr=num($('rate').value), n=Math.round(num($('term').value)), add=num($('monthly').value);
    if(!P||!yr||!n){$('receipt').classList.remove('show');$('sched').classList.remove('show');return}
    var i=yr/100/12, bal=P, earned=0, deposited=P;
    rows=[];
    for(var k=1;k<=n;k++){
      var start=bal;
      var fo=bal*i;
      earned+=fo;
      var added=(k<n)?add:0; // last month: no top-up
      if(cap){bal=bal+fo+added}else{bal=bal+added}
      deposited+=added;
      rows.push([k,start,fo,added,cap?bal:bal]); 
    }
    var finalSum=cap?bal:bal+0; // without cap, interest paid out separately
    var totalFinal=cap?bal:(bal+earned);
    var effYield=earned/deposited*(12/n)*100;
    calcData={deposited:deposited,earned:earned,finalSum:totalFinal,n:n,effYield:effYield};
    expanded=false;
    renderResult();renderRows();
    $('receipt').classList.add('show');
    $('sched').classList.remove('show');
  }

  function renderResult(){
    var d=calcData, sum=' '+t('uSum');
    $('mainNum').textContent=fmt(d.finalSum)+sum;
    $('rDeposited').textContent=fmt(d.deposited)+sum;
    $('rEarned').textContent='+'+fmt(d.earned)+sum;
    $('rYield').textContent=d.effYield.toFixed(1)+'% '+(lang==='uz'?'yillik':'годовых');
    $('rTerm').textContent=d.n+' '+t('months');
  }

  function renderRows(){
    var lim=expanded?rows.length:Math.min(12,rows.length), html='';
    for(var j=0;j<lim;j++){
      var r=rows[j];
      html+='<tr><td>'+r[0]+'</td><td>'+fmt(r[1])+'</td><td>'+fmt(r[2])+'</td><td>'+(r[3]?fmt(r[3]):'—')+'</td><td>'+fmt(r[4])+'</td></tr>';
    }
    $('schedBody').innerHTML=html;
    $('moreBtn').style.display=rows.length>12?'block':'none';
    $('moreBtn').textContent=expanded?t('moreHide'):t('moreShow')+' ('+rows.length+')';
  }

  $('moreBtn').onclick=function(){expanded=!expanded;renderRows()};
  $('calcBtn').onclick=calc;
  $('schedBtn').onclick=function(){
    var s=$('sched');s.classList.toggle('show');
    if(s.classList.contains('show'))s.scrollIntoView({behavior:'smooth',block:'start'});
  };
  $('shareBtn').onclick=function(){
    if(!calcData)return;
    var txt=t('shareTitle')+': '+$('amount').value+' '+t('uSum')+', '+$('rate').value+'%, '+$('term').value+' '+t('uMonths')+'. '+t('lblFinal')+': '+fmt(calcData.finalSum)+' '+t('uSum')+' (+'+fmt(calcData.earned)+')';
    var b=this;
    if(navigator.share){navigator.share({title:t('shareTitle'),text:txt}).catch(function(){})}
    else if(navigator.clipboard){navigator.clipboard.writeText(txt);b.textContent=t('copied');setTimeout(function(){b.textContent=t('btnShare')},1500)}
  };

  applyLang();
  calc();
})();
</script>
</body>
</html>
