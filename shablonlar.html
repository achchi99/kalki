<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shablonlar — Kalki.uz | Word va Excel namunalari</title>
<meta name="description" content="Bepul Word va Excel shablonlari: ijara shartnomasi, qurilish smetasi, mehnat shartnomasi va boshqalar. Kalki.uz shablonlar bo'limi.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cat:#1A2B24;--accent:#D99A2B;--cat-soft:#F3EFE5;--cat-text:#C9D6CE;
--paper:#F7F8F6;--card:#FFFFFF;--ink:#16211C;--muted:#5C6B63;--line:#DDE5E0;--radius:14px;--ok:#1E6B45;--ok-soft:#E7F3EC}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:0 16px 48px}
header{background:var(--cat);color:#fff;padding:22px 16px 30px}
header .wrap{padding-bottom:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cat-text);text-decoration:none}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lang-seg{display:flex;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;gap:3px}
.lang-seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:800;color:var(--cat-text);padding:6px 12px;border-radius:7px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lang-seg button.on{background:#fff;color:var(--cat)}
h1{font-size:26px;font-weight:800;line-height:1.2}
.sub{margin-top:8px;font-size:14.5px;color:var(--cat-text);max-width:46ch}
.tpl{display:flex;align-items:flex-start;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:12px}
.tpl-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.tpl-icon.xls{background:#E7F3EC}
.tpl-icon.doc{background:#E8F1F6}
.tpl-body{flex:1;min-width:0}
.tpl-name{font-size:15.5px;font-weight:800}
.tpl-desc{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px}
.tpl-meta{display:flex;gap:8px;margin-top:9px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;font-weight:800;letter-spacing:.05em;border-radius:99px;padding:4px 10px}
.badge.xls{background:#E7F3EC;color:#1E6B45}
.badge.doc{background:#E8F1F6;color:#1D4E6B}
.badge.soon{background:#F0F0EC;color:#8A968F}
.dl{font-size:13px;font-weight:800;color:#fff;background:var(--cat);border-radius:9px;padding:8px 16px;text-decoration:none;-webkit-tap-highlight-color:transparent}
.dl:active{opacity:.85}
h2.sect{font-size:18px;font-weight:800;margin:28px 0 4px}
.sect-sub{font-size:13px;color:var(--muted)}
footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
</style>
<link rel="manifest" href="manifest.json">
<style id="clsfix">
/* CLS barqarorlashtirish — elementlar sakramasligi uchun */
header{min-height:150px}
h1{min-height:1.2em}
[data-i]:empty{display:inline-block;min-height:1em;min-width:1px}
.sub[data-i]{min-height:1.4em;display:block}
.brand,.cat-badge{min-height:1em}
img,svg{height:auto}
.form-card,.card2{contain:layout}
</style>
<script src="ga.js" defer></script>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:image" content="https://kalki.uz/og-image.png">
</head>
<body>
<div id="topmenu" style="background:#0B120E;overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="max-width:720px;margin:0 auto;display:flex;gap:4px;padding:9px 14px"><a href="./" style="color:#CBD5CE;font-size:13px;font-weight:800;text-decoration:none;padding:6px 11px;border-radius:8px;white-space:nowrap">🏠 Asosiy</a><a href="./#cat-moliya" style="color:#CBD5CE;font-size:13px;font-weight:800;text-decoration:none;padding:6px 11px;border-radius:8px;white-space:nowrap">Moliya</a><a href="./#cat-qurilish" style="color:#CBD5CE;font-size:13px;font-weight:800;text-decoration:none;padding:6px 11px;border-radius:8px;white-space:nowrap">Qurilish</a><a href="./#cat-kommunal" style="color:#CBD5CE;font-size:13px;font-weight:800;text-decoration:none;padding:6px 11px;border-radius:8px;white-space:nowrap">Kommunal</a><a href="./#cat-hayot" style="color:#CBD5CE;font-size:13px;font-weight:800;text-decoration:none;padding:6px 11px;border-radius:8px;white-space:nowrap">Hayotiy</a><a href="shablonlar" style="color:#CBD5CE;font-size:13px;font-weight:800;text-decoration:none;padding:6px 11px;border-radius:8px;white-space:nowrap">📄 Shablonlar</a></div></div>
<header>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="./"><span class="brand-dot"></span>Kalki.uz</a>
      <div class="lang-seg"><button type="button" id="langUz" class="on">UZ</button><button type="button" id="langRu">RU</button></div>
    </div>
    <h1 data-i="h1"></h1>
    <p class="sub" data-i="sub"></p>
  </div>
</header>
<main class="wrap">
  <h2 class="sect" data-i="readyH"></h2>
  <p class="sect-sub" data-i="readySub"></p>
  <div id="readyList"></div>
  <h2 class="sect" data-i="soonH"></h2>
  <p class="sect-sub" data-i="soonSub"></p>
  <div id="soonList"></div>
  <div id="fbcall" style="margin-top:32px;background:linear-gradient(135deg,#1A2B24,#452B4B);border-radius:14px;padding:18px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div style="font-size:15px;font-weight:800;color:#fff">Taklif yoki xato topdingizmi?</div><div style="font-size:12.5px;font-weight:600;color:#C9D6CE;margin-top:3px">Yangi kalkulyator kerakmi? Yozing — tez qo‘shamiz. / Нашли ошибку? Напишите!</div></div><a href="https://t.me/kalki_uz" style="background:#D99A2B;color:#16211C;font-size:14px;font-weight:800;padding:11px 18px;border-radius:10px;text-decoration:none;white-space:nowrap">✈️ Telegram’ga yozish</a></div>
  <footer data-i="foot"></footer>
  <div id="legal-links" style="margin-top:10px;font-size:12.5px;font-weight:700"><a href="maxfiylik" style="color:#5C6B63;text-decoration:none">Maxfiylik</a><span style="color:#B9C2BC"> · </span><a href="shartlar" style="color:#5C6B63;text-decoration:none">Foydalanish shartlari</a><span style="color:#B9C2BC"> · </span><a href="https://t.me/kalki_uz" style="color:#5C6B63;text-decoration:none">Aloqa</a></div>
</main>
<script>
(function(){
  var READY=[
    {id:'ijara',uz:'shablon-ijara-shartnoma.docx',ru:'shablon-ijara-shartnoma-ru.docx',type:'doc',icon:'\uD83D\uDCC4'},
    {id:'smeta',uz:'shablon-qurilish-smeta.xlsx',ru:'shablon-qurilish-smeta-ru.xlsx',type:'xls',icon:'\uD83D\uDCCA'}
  ];
  var SOON=[
    {id:'mehnat',type:'doc'},{id:'xizmat',type:'doc'},{id:'ishonch',type:'doc'},
    {id:'ariza',type:'doc'},{id:'invoys',type:'xls'},{id:'byudjet',type:'xls'},
    {id:'tabel',type:'xls'},{id:'biznes',type:'doc'}
  ];
  var I={
    uz:{
      h1:"Tayyor shablonlar",
      sub:"Word va Excel namunalari — yuklab oling, o'z ma'lumotlaringizni kiriting va foydalaning. Bepul.",
      readyH:"Yuklab olish uchun tayyor",
      readySub:"Bosing — hujjat telefoningizga yoki kompyuteringizga yuklanadi.",
      soonH:"Tez kunda qo'shiladi",
      soonSub:"Qaysi shablon kerakligini Telegram orqali yozing — birinchi navbatda tayyorlaymiz.",
      dl:"Yuklash",soon:"Tez kunda",
      names:{
        ijara:["Turar joy ijarasi shartnomasi","To'ldirish uchun bo'sh joylar bilan tayyor namuna. 2 sahifa."],
        smeta:["Qurilish smetasi","Materiallar, ishchi kuchi, boshqa xarajatlar — jamilar avtomatik hisoblanadi."],
        mehnat:["Mehnat shartnomasi","Ish beruvchi va xodim o'rtasidagi standart shartnoma"],
        xizmat:["Xizmat ko'rsatish shartnomasi","Pullik xizmatlar uchun namuna"],
        ishonch:["Ishonchnoma","Oddiy yozma ishonchnoma namunasi"],
        ariza:["Ariza namunalari","Ishga qabul, bo'shatish, ta'til arizalari"],
        invoys:["Hisob-faktura (invoys)","Mijozga hisob qo'yish uchun Excel shakl"],
        byudjet:["Oilaviy byudjet","Daromad-xarajatlarni kuzatish jadvali"],
        tabel:["Davomat tabeli","Xodimlar ish vaqtini hisobga olish"],
        biznes:["Biznes-reja shabloni","Kichik biznes uchun tayyor tuzilma"]
      },
      foot:"Shablonlar umumiy namuna sifatida berilgan. Muhim bitimlar oldidan yurist bilan maslahatlashing. © 2026 Kalki.uz — Achchi loyihasi."
    },
    ru:{
      h1:"Готовые шаблоны",
      sub:"Образцы Word и Excel — скачайте, внесите свои данные и пользуйтесь. Бесплатно.",
      readyH:"Готовы к скачиванию",
      readySub:"Нажмите — документ загрузится на телефон или компьютер.",
      soonH:"Скоро добавим",
      soonSub:"Напишите в Telegram, какой шаблон нужен — подготовим в первую очередь.",
      dl:"Скачать",soon:"Скоро",
      names:{
        ijara:["Договор аренды жилья","Готовый образец с полями для заполнения. 2 страницы."],
        smeta:["Строительная смета","Материалы, рабочая сила, прочее — итоги считаются автоматически."],
        mehnat:["Трудовой договор","Стандартный договор работодателя и работника"],
        xizmat:["Договор оказания услуг","Образец для платных услуг"],
        ishonch:["Доверенность","Образец простой письменной доверенности"],
        ariza:["Образцы заявлений","О приёме, увольнении, отпуске"],
        invoys:["Счёт-фактура (инвойс)","Excel-форма для выставления счёта"],
        byudjet:["Семейный бюджет","Таблица учёта доходов и расходов"],
        tabel:["Табель посещаемости","Учёт рабочего времени сотрудников"],
        biznes:["Шаблон бизнес-плана","Готовая структура для малого бизнеса"]
      },
      foot:"Шаблоны даны как общие образцы. Перед важными сделками проконсультируйтесь с юристом. © 2026 Kalki.uz — проект Achchi."
    }
  };
  var lang='uz';
  var $=function(id){return document.getElementById(id)};
  var t=function(k){return I[lang][k]};
  function render(){
    var h='';
    READY.forEach(function(x){
      var n=t('names')[x.id];
      h+='<div class="tpl"><span class="tpl-icon '+x.type+'">'+x.icon+'</span><div class="tpl-body">'
        +'<div class="tpl-name">'+n[0]+'</div><div class="tpl-desc">'+n[1]+'</div>'
        +'<div class="tpl-meta"><span class="badge '+x.type+'">'+(x.type==='xls'?'Excel':'Word')+'</span>'
        +'<a class="dl" href="'+x.uz+'" download>'+t('dl')+' (UZ)</a>'
        +'<a class="dl" style="background:#5C6B63" href="'+x.ru+'" download>'+t('dl')+' (RU)</a></div></div></div>';
    });
    $('readyList').innerHTML=h;
    var s='';
    SOON.forEach(function(x){
      var n=t('names')[x.id];
      s+='<div class="tpl" style="opacity:.75"><span class="tpl-icon '+x.type+'">'+(x.type==='xls'?'\uD83D\uDCCA':'\uD83D\uDCC4')+'</span><div class="tpl-body">'
        +'<div class="tpl-name">'+n[0]+'</div><div class="tpl-desc">'+n[1]+'</div>'
        +'<div class="tpl-meta"><span class="badge '+x.type+'">'+(x.type==='xls'?'Excel':'Word')+'</span>'
        +'<span class="badge soon">'+t('soon')+'</span></div></div></div>';
    });
    $('soonList').innerHTML=s;
  }
  function applyLang(){
    document.documentElement.lang=lang;
    var els=document.querySelectorAll('[data-i]');
    for(var i=0;i<els.length;i++){els[i].textContent=t(els[i].getAttribute('data-i'))}
    $('langUz').classList.toggle('on',lang==='uz');
    $('langRu').classList.toggle('on',lang==='ru');
    render();
  }
  $('langUz').onclick=function(){lang='uz';applyLang()};
  $('langRu').onclick=function(){lang='ru';applyLang()};
  applyLang();
})();
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
</script>
</body>
</html>
