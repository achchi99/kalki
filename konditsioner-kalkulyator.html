<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Konditsioner kalkulyatori — xona uchun BTU quvvatini tanlash</title>
<meta name="description" content="Konditsioner quvvati kalkulyatori: xona maydoni bo'yicha necha BTU kerakligini hisoblang (7/9/12/18/24). Калькулятор мощности кондиционера BTU.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body[data-cat="kommunal"]{--cat:#1D4E6B;--cat-deep:#143A52;--accent:#6FB3D9;--cat-soft:#E8F1F6;--cat-text:#BBD6E6}
:root{--paper:#F7F8F6;--card:#FFFFFF;--ink:#16211C;--muted:#5C6B63;--line:#DDE5E0;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 48px}
header{background:var(--cat);color:#fff;padding:22px 16px 68px;position:relative}
header .wrap{padding-bottom:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cat-text)}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lang-seg{display:flex;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;gap:3px}
.lang-seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:800;color:var(--cat-text);padding:6px 12px;border-radius:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:.04em}
.lang-seg button.on{background:#fff;color:var(--cat)}
.cat-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.13);color:#fff;padding:5px 11px;border-radius:99px;margin-bottom:12px}
.cat-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
h1{font-size:26px;font-weight:800;line-height:1.2;letter-spacing:-.01em}
.sub{margin-top:8px;font-size:14.5px;color:var(--cat-text);max-width:42ch}
.form-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px 22px;margin-top:-44px;box-shadow:0 6px 24px rgba(0,0,0,.10);position:relative}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.02em}
.input-shell{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;background:#FBFCFB;transition:border-color .15s;overflow:hidden}
.input-shell:focus-within{border-color:var(--cat)}
input[type=text]{flex:1;border:0;outline:0;background:transparent;font:inherit;font-size:17px;font-weight:700;color:var(--ink);padding:12px 13px;min-width:0}
.unit{font-size:12.5px;font-weight:700;color:var(--muted);padding:0 12px;white-space:nowrap;border-left:1px solid var(--line);align-self:stretch;display:flex;align-items:center;background:#F2F5F3}
.row2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
@media (max-width:380px){.row2{grid-template-columns:1fr}}
.toggle-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:6px 0}
.toggle-row .tl{font-size:14px;font-weight:700;flex:1}
.switch{position:relative;width:52px;height:30px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#D8DFDA;border-radius:99px;transition:.2s;cursor:pointer}
.slider::before{content:"";position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch input:checked + .slider{background:var(--cat)}
.switch input:checked + .slider::before{transform:translateX(22px)}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}
.calc-btn{width:100%;margin-top:20px;background:var(--cat);color:#fff;border:0;border-radius:12px;font:inherit;font-size:17px;font-weight:800;padding:16px;cursor:pointer;transition:background .15s,transform .05s;-webkit-tap-highlight-color:transparent}
.calc-btn:active{transform:scale(.985);background:var(--cat-deep)}
.receipt{margin-top:26px;display:none;filter:drop-shadow(0 10px 24px rgba(0,0,0,.14))}
.receipt.show{display:block;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.receipt.show{animation:none}}
.receipt-body{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:22px 20px 18px}
.receipt-tag{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px}
.receipt-tag::after{content:"";flex:1;height:1px;background:var(--line)}
.big-figure{margin-top:12px;text-align:center}
.btu-class{font-size:54px;font-weight:800;color:var(--cat);line-height:1}
.btu-class small{font-size:20px;color:var(--muted)}
.big-figure .lbl{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:6px}
.receipt-rows{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px}
.rrow{display:flex;justify-content:space-between;gap:12px;font-size:14.5px;padding:6px 0}
.rrow .k{color:var(--muted);font-weight:600}
.rrow .v{font-weight:800;text-align:right}
.rrow .v.accent{color:var(--accent)}
.receipt-edge{height:14px;background:radial-gradient(circle at 8px -4px, transparent 8px, var(--card) 8.5px);background-size:22px 14px;background-repeat:repeat-x}
.seo{margin-top:36px;font-size:15px;color:#33403A}
.seo h2{font-size:18px;font-weight:800;color:var(--ink);margin:22px 0 8px}
.seo p{margin-bottom:10px}
footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
</style>
</head>
<body data-cat="kommunal">

<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span>Kalki.uz</div>
      <div class="lang-seg" role="group" aria-label="Til / Язык">
        <button type="button" id="langUz" class="on">UZ</button>
        <button type="button" id="langRu">RU</button>
      </div>
    </div>
    <span class="cat-badge" data-i="cat"></span>
    <h1 data-i="h1"></h1>
    <p class="sub" data-i="sub"></p>
  </div>
</header>

<main class="wrap">
  <section class="form-card">
    <div class="field">
      <div class="row2">
        <div>
          <label for="area" data-i="lArea"></label>
          <div class="input-shell"><input type="text" id="area" inputmode="decimal" value="18"><span class="unit">m²</span></div>
        </div>
        <div>
          <label for="ceil" data-i="lCeil"></label>
          <div class="input-shell"><input type="text" id="ceil" inputmode="decimal" value="2,8"><span class="unit">m</span></div>
        </div>
      </div>
    </div>
    <div class="field">
      <label for="people" data-i="lPeople"></label>
      <div class="input-shell"><input type="text" id="people" inputmode="numeric" value="2"><span class="unit" data-i="uPeople"></span></div>
      <p class="hint" data-i="hPeople"></p>
    </div>
    <div class="field" style="margin-bottom:0">
      <div class="toggle-row"><span class="tl" data-i="tSunny"></span><label class="switch"><input type="checkbox" id="sunny" checked><span class="slider"></span></label></div>
      <div class="toggle-row"><span class="tl" data-i="tTop"></span><label class="switch"><input type="checkbox" id="topFloor"><span class="slider"></span></label></div>
      <div class="toggle-row"><span class="tl" data-i="tTech"></span><label class="switch"><input type="checkbox" id="tech" checked><span class="slider"></span></label></div>
      <p class="hint" data-i="hToggles"></p>
    </div>
    <button type="button" class="calc-btn" id="calcBtn" data-i="btnCalc"></button>
  </section>

  <section class="receipt" id="receipt" aria-live="polite">
    <div class="receipt-body">
      <div class="receipt-tag" data-i="rTag"></div>
      <div class="big-figure">
        <div class="btu-class" id="btuClass">—</div>
        <div class="lbl" data-i="lblClass"></div>
      </div>
      <div class="receipt-rows">
        <div class="rrow"><span class="k" data-i="kNeed"></span><span class="v" id="rNeed">—</span></div>
        <div class="rrow"><span class="k" data-i="kBtu"></span><span class="v" id="rBtu">—</span></div>
        <div class="rrow"><span class="k" data-i="kCover"></span><span class="v accent" id="rCover">—</span></div>
      </div>
    </div>
    <div class="receipt-edge"></div>
  </section>

  <section class="seo" id="seoBlock"></section>
  <footer data-i="foot"></footer>
</main>

<script>
(function(){
  var CLASSES=[
    {name:'7',  kw:2.1},
    {name:'9',  kw:2.6},
    {name:'12', kw:3.5},
    {name:'18', kw:5.2},
    {name:'24', kw:7.0}
  ];
  var I={
    uz:{
      cat:"Kommunal",
      h1:"Konditsioner kalkulyatori",
      sub:"Xona o'lchamlari bo'yicha qaysi BTU sinf konditsioner kerakligini aniqlang — ortiqcha pul to'lamang.",
      lArea:"Xona maydoni",lCeil:"Ship balandligi",
      lPeople:"Doimiy odamlar soni",uPeople:"kishi",
      hPeople:"Har bir kishi ~100 W issiqlik chiqaradi.",
      tSunny:"Quyoshli tomon (janub/g'arb)",
      tTop:"Oxirgi qavat (tom ostida)",
      tTech:"Televizor/kompyuter bor",
      hToggles:"O'zbekiston yozi uchun quyosh omili ayniqsa muhim.",
      btnCalc:"Hisoblash",rTag:"Hisob natijasi",
      lblClass:"tavsiya etiladigan sinf (BTU/soat ming hisobida)",
      kNeed:"Kerakli sovutish quvvati",kBtu:"BTU/soatda",kCover:"Tanlangan sinf quvvati",
      foot:"Hisob 100 W/m² bazasida, quyosh +20%, oxirgi qavat +15%. Aniq tanlov uchun ustaga maslahat soling.",
      seo:'<h2>BTU nima va sinflar nimani anglatadi?</h2><p>BTU/soat — sovutish quvvati birligi. "7", "9", "12" kabi sinflar ming BTU\'ni anglatadi: "9-lik" ≈ 2,6 kW va odatda 20–25 m² xonaga mos. Noto\'g\'ri (kichik) tanlov — konditsioner tinmay ishlaydi, ko\'p tok yeydi va tez ishdan chiqadi.</p><h2>O\'zbekiston yozida nimaga e\'tibor berish kerak?</h2><p>+40° va undan issiq kunlarda quyoshli tomondagi xonalarga zaxirali sinf oling. Inverter modellar tokni 30–40% tejaydi — narx farqi 2–3 mavsumda qoplanadi.</p><h2>Bitta katta konditsioner butun uyga yetadimi?</h2><p>Yo\'q — sovuq havo devorlardan o\'tmaydi. Har yopiq xonaga alohida ichki blok kerak, yoki kanalli/multi-split tizim o\'rnatiladi.</p>'
    },
    ru:{
      cat:"Коммуналка",
      h1:"Калькулятор кондиционера",
      sub:"Определите, какой класс BTU нужен по размерам комнаты — не переплачивайте.",
      lArea:"Площадь комнаты",lCeil:"Высота потолка",
      lPeople:"Постоянно людей",uPeople:"чел.",
      hPeople:"Каждый человек выделяет ~100 Вт тепла.",
      tSunny:"Солнечная сторона (юг/запад)",
      tTop:"Последний этаж (под крышей)",
      tTech:"Есть телевизор/компьютер",
      hToggles:"Для узбекского лета солнечный фактор особенно важен.",
      btnCalc:"Рассчитать",rTag:"Результат расчёта",
      lblClass:"рекомендуемый класс (тысяч BTU/час)",
      kNeed:"Нужная мощность охлаждения",kBtu:"В BTU/час",kCover:"Мощность выбранного класса",
      foot:"Расчёт от базы 100 Вт/м², солнце +20%, последний этаж +15%. Для точного подбора посоветуйтесь с мастером.",
      seo:'<h2>Что такое BTU и классы?</h2><p>BTU/час — единица холодопроизводительности. Классы «7», «9», «12» означают тысячи BTU: «девятка» ≈ 2,6 кВт и обычно подходит для 20–25 м². Слишком слабый кондиционер работает без остановки, ест много электричества и быстро изнашивается.</p><h2>На что смотреть узбекским летом?</h2><p>При +40° и выше для солнечных комнат берите класс с запасом. Инверторные модели экономят 30–40% электричества — разница в цене окупается за 2–3 сезона.</p><h2>Хватит ли одного мощного кондиционера на весь дом?</h2><p>Нет — холодный воздух не проходит сквозь стены. На каждую закрытую комнату нужен свой внутренний блок либо канальная/мульти-сплит система.</p>'
    }
  };
  var lang='uz', calcData=null;
  var $=function(id){return document.getElementById(id)};
  var t=function(k){return I[lang][k]};
  var num=function(s){return parseFloat(String(s).replace(/[^\d.,]/g,'').replace(',','.'))||0};

  function applyLang(){
    document.documentElement.lang=lang;
    var els=document.querySelectorAll('[data-i]');
    for(var i=0;i<els.length;i++){els[i].textContent=t(els[i].getAttribute('data-i'))}
    $('seoBlock').innerHTML=t('seo');
    $('langUz').classList.toggle('on',lang==='uz');
    $('langRu').classList.toggle('on',lang==='ru');
    if(calcData)renderResult();
  }
  $('langUz').onclick=function(){lang='uz';applyLang()};
  $('langRu').onclick=function(){lang='ru';applyLang()};

  function calc(){
    var area=num($('area').value), ceil=num($('ceil').value)||2.8, ppl=num($('people').value);
    if(!area){$('receipt').classList.remove('show');return}
    var baseW=area*100*(ceil/2.8);
    if($('sunny').checked)baseW*=1.2;
    if($('topFloor').checked)baseW*=1.15;
    baseW+=Math.max(0,ppl-1)*100;
    if($('tech').checked)baseW+=300;
    var kw=baseW/1000;
    var cls=CLASSES[CLASSES.length-1];
    for(var i=0;i<CLASSES.length;i++){if(CLASSES[i].kw>=kw){cls=CLASSES[i];break}}
    calcData={kw:kw,btu:kw*3412,cls:cls};
    renderResult();
    $('receipt').classList.add('show');
  }

  function renderResult(){
    var d=calcData;
    $('btuClass').innerHTML='«'+d.cls.name+'»';
    $('rNeed').textContent=d.kw.toFixed(1).replace('.',',')+' kW';
    $('rBtu').textContent='\u2248 '+Math.round(d.btu/100)*100+' BTU';
    $('rCover').textContent=d.cls.kw.toFixed(1).replace('.',',')+' kW';
  }

  $('calcBtn').onclick=calc;
  applyLang();
  calc();
})();
</script>
</body>
</html>
