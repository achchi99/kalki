<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DTM ball kalkulyatori — abituriyent balini hisoblash</title>
<meta name="description" content="DTM ball kalkulyatori: to'g'ri javoblar bo'yicha 3,1 / 2,1 / 1,1 koeffitsiyentlarda umumiy balni hisoblang. Kalkulyator ballov DTM.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body[data-cat="hayot"]{--cat:#5B3A63;--cat-deep:#452B4B;--accent:#D98BA6;--cat-soft:#F3EDF5;--cat-text:#D9C6DE}
:root{--paper:#F7F8F6;--card:#FFFFFF;--ink:#16211C;--muted:#5C6B63;--line:#DDE5E0;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 48px}
header{background:var(--cat);color:#fff;padding:22px 16px 68px;position:relative}
header .wrap{padding-bottom:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cat-text)}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lang-seg{display:flex;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;gap:3px}
.lang-seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:800;color:var(--cat-text);padding:6px 12px;border-radius:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:.04em}
.lang-seg button.on{background:#fff;color:var(--cat)}
.cat-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.13);color:#fff;padding:5px 11px;border-radius:99px;margin-bottom:12px}
.cat-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
h1{font-size:26px;font-weight:800;line-height:1.2;letter-spacing:-.01em}
.sub{margin-top:8px;font-size:14.5px;color:var(--cat-text);max-width:42ch}
.form-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px 22px;margin-top:-44px;box-shadow:0 6px 24px rgba(0,0,0,.10);position:relative}
.subject{border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#FBFCFB}
.subj-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.subj-name{font-size:14.5px;font-weight:800}
.subj-coef{font-size:12px;font-weight:800;color:var(--cat);background:var(--cat-soft);border-radius:99px;padding:3px 10px}
.counter{display:flex;align-items:center;gap:12px}
.cnt-btn{width:44px;height:44px;border:1.5px solid var(--line);background:#fff;border-radius:11px;font-size:20px;font-weight:800;color:var(--cat);cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.cnt-btn:active{background:var(--cat-soft)}
.cnt-val{flex:1;text-align:center}
.cnt-val input{width:100%;border:0;outline:0;background:transparent;font:inherit;font-size:24px;font-weight:800;color:var(--ink);text-align:center}
.cnt-max{font-size:11.5px;color:var(--muted);font-weight:700;text-align:center}
.subj-pts{font-size:12.5px;color:var(--muted);font-weight:700;text-align:right;margin-top:8px}
.subj-pts b{color:var(--cat);font-size:14px}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}
.norm-banner{margin-top:20px;background:var(--cat);color:#fff;border-radius:var(--radius);padding:18px 20px;box-shadow:0 8px 22px rgba(0,0,0,.15)}
.norm-banner .nb-lbl{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--cat-text)}
.norm-banner .nb-num{font-size:36px;font-weight:800;margin-top:4px}
.norm-banner .nb-num small{font-size:16px;font-weight:700;color:var(--cat-text)}
.progress{margin-top:12px;background:rgba(255,255,255,.18);border-radius:99px;height:10px;overflow:hidden}
.progress .bar{height:100%;background:var(--accent);border-radius:99px;transition:width .3s ease}
.nb-pct{margin-top:8px;font-size:13px;font-weight:700;color:var(--cat-text)}
.seo{margin-top:36px;font-size:15px;color:#33403A}
.seo h2{font-size:18px;font-weight:800;color:var(--ink);margin:22px 0 8px}
.seo p{margin-bottom:10px}
footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
</style>
</head>
<body data-cat="hayot">

<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span>Kalki.uz</div>
      <div class="lang-seg" role="group" aria-label="Til / Язык">
        <button type="button" id="langUz" class="on">UZ</button>
        <button type="button" id="langRu">RU</button>
      </div>
    </div>
    <span class="cat-badge" data-i="cat"></span>
    <h1 data-i="h1"></h1>
    <p class="sub" data-i="sub"></p>
  </div>
</header>

<main class="wrap">
  <section class="form-card">
    <div class="subject">
      <div class="subj-head"><span class="subj-name" data-i="s1n"></span><span class="subj-coef">× 3,1</span></div>
      <div class="counter">
        <button type="button" class="cnt-btn" data-t="f1" data-d="-1">−</button>
        <div class="cnt-val"><input type="text" id="f1" inputmode="numeric" value="20"><div class="cnt-max" data-i="max30"></div></div>
        <button type="button" class="cnt-btn" data-t="f1" data-d="1">+</button>
      </div>
      <div class="subj-pts"><span data-i="pts"></span> <b id="p1">—</b></div>
    </div>

    <div class="subject">
      <div class="subj-head"><span class="subj-name" data-i="s2n"></span><span class="subj-coef">× 2,1</span></div>
      <div class="counter">
        <button type="button" class="cnt-btn" data-t="f2" data-d="-1">−</button>
        <div class="cnt-val"><input type="text" id="f2" inputmode="numeric" value="20"><div class="cnt-max" data-i="max30"></div></div>
        <button type="button" class="cnt-btn" data-t="f2" data-d="1">+</button>
      </div>
      <div class="subj-pts"><span data-i="pts"></span> <b id="p2">—</b></div>
    </div>

    <div class="subject" style="margin-bottom:0">
      <div class="subj-head"><span class="subj-name" data-i="s3n"></span><span class="subj-coef">× 1,1</span></div>
      <div class="counter">
        <button type="button" class="cnt-btn" data-t="f3" data-d="-1">−</button>
        <div class="cnt-val"><input type="text" id="f3" inputmode="numeric" value="20"><div class="cnt-max" data-i="max30"></div></div>
        <button type="button" class="cnt-btn" data-t="f3" data-d="1">+</button>
      </div>
      <div class="subj-pts"><span data-i="pts"></span> <b id="p3">—</b></div>
      <p class="hint" data-i="h3"></p>
    </div>
  </section>

  <section class="norm-banner" aria-live="polite">
    <div class="nb-lbl" data-i="nbLbl"></div>
    <div class="nb-num"><span id="totalPts">—</span> <small>/ 189,0</small></div>
    <div class="progress"><div class="bar" id="bar" style="width:0%"></div></div>
    <div class="nb-pct" id="pctTxt"></div>
  </section>

  <section class="seo" id="seoBlock"></section>
  <footer data-i="foot"></footer>
</main>

<script>
(function(){
  var I={
    uz:{
      cat:"Hayotiy",
      h1:"DTM ball kalkulyatori",
      sub:"Har fandagi to'g'ri javoblar sonini kiriting — umumiy balingiz koeffitsiyentlar bilan darhol hisoblanadi.",
      s1n:"1-asosiy fan",s2n:"2-asosiy fan",s3n:"Majburiy fanlar (jami)",
      max30:"0–30 savol",
      pts:"Ball:",
      h3:"Ona tili, matematika va O'zbekiston tarixi — har biri 10 tadan, jami 30 savol.",
      nbLbl:"Umumiy DTM balingiz",
      pctFmt:"Bu maksimal balning {p}% i",
      foot:"Koeffitsiyentlar: 3,1 / 2,1 / 1,1. Maksimal 189,0 ball. Grant chegarasi yo'nalish va yilga qarab farq qiladi.",
      seo:'<h2>DTM bali qanday hisoblanadi?</h2><p>Har bir blokda 30 tadan savol: 1-asosiy fan to\'g\'ri javobiga 3,1 ball, 2-asosiy fanga 2,1 ball, majburiy fanlar (ona tili, matematika, tarix) har biriga 1,1 ball beriladi. Maksimal ball: 93 + 63 + 33 = 189.</p><h2>Grant uchun qancha ball kerak?</h2><p>Aniq chegara yo\'q — u yo\'nalish, OTM va yilga qarab o\'zgaradi. Kuchli yo\'nalishlarda (masalan, davolash ishi, xalqaro munosabatlar) 170+ ball, ayrim yo\'nalishlarda 120–140 ball ham grant bo\'lishi mumkin. O\'tgan yilgi chegaralarni mo\'ljal qiling.</p><h2>Ijodiy imtihonli yo\'nalishlar-chi?</h2><p>Ijodiy imtihon talab qilinadigan yo\'nalishlarda (jurnalistika, san\'at, arxitektura) hisoblash tartibi farq qiladi — ijodiy imtihon ballari alohida qo\'shiladi. Bu kalkulyator standart 3 blokli test uchun.</p>'
    },
    ru:{
      cat:"Жизнь",
      h1:"Калькулятор баллов DTM",
      sub:"Введите число правильных ответов по каждому предмету — общий балл с коэффициентами рассчитается мгновенно.",
      s1n:"1-й основной предмет",s2n:"2-й основной предмет",s3n:"Обязательные предметы (всего)",
      max30:"0–30 вопросов",
      pts:"Баллы:",
      h3:"Родной язык, математика и история Узбекистана — по 10 вопросов, всего 30.",
      nbLbl:"Ваш общий балл DTM",
      pctFmt:"Это {p}% от максимума",
      foot:"Коэффициенты: 3,1 / 2,1 / 1,1. Максимум 189,0 баллов. Проходной на грант зависит от направления и года.",
      seo:'<h2>Как считается балл DTM?</h2><p>В каждом блоке 30 вопросов: за правильный ответ по 1-му основному предмету — 3,1 балла, по 2-му — 2,1 балла, по обязательным (родной язык, математика, история) — по 1,1 балла. Максимум: 93 + 63 + 33 = 189.</p><h2>Сколько баллов нужно на грант?</h2><p>Точного порога нет — он зависит от направления, вуза и года. На сильных направлениях (лечебное дело, международные отношения) 170+, на некоторых грант возможен и со 120–140 баллами. Ориентируйтесь на прошлогодние проходные.</p><h2>А направления с творческим экзаменом?</h2><p>Там порядок отличается — баллы творческого экзамена добавляются отдельно. Этот калькулятор — для стандартного теста из 3 блоков.</p>'
    }
  };
  var lang='uz';
  var $=function(id){return document.getElementById(id)};
  var t=function(k){return I[lang][k]};
  var num=function(s){return parseInt(String(s).replace(/[^\d]/g,''),10)||0};

  function clamp(v){return Math.max(0,Math.min(30,v))}

  function calc(){
    var f1=clamp(num($('f1').value)), f2=clamp(num($('f2').value)), f3=clamp(num($('f3').value));
    $('f1').value=f1;$('f2').value=f2;$('f3').value=f3;
    var p1=f1*3.1, p2=f2*2.1, p3=f3*1.1;
    var total=p1+p2+p3;
    var fx=function(n){return n.toFixed(1).replace('.',',')};
    $('p1').textContent=fx(p1);$('p2').textContent=fx(p2);$('p3').textContent=fx(p3);
    $('totalPts').textContent=fx(total);
    var pct=Math.round(total/189*100);
    $('bar').style.width=pct+'%';
    $('pctTxt').textContent=t('pctFmt').replace('{p}',pct);
  }

  var btns=document.querySelectorAll('.cnt-btn');
  for(var b=0;b<btns.length;b++){
    btns[b].onclick=function(){
      var el=$(this.getAttribute('data-t'));
      el.value=clamp(num(el.value)+parseInt(this.getAttribute('data-d'),10));
      calc();
    };
  }
  ['f1','f2','f3'].forEach(function(id){$(id).addEventListener('input',calc)});

  function applyLang(){
    document.documentElement.lang=lang;
    var els=document.querySelectorAll('[data-i]');
    for(var i=0;i<els.length;i++){els[i].textContent=t(els[i].getAttribute('data-i'))}
    $('seoBlock').innerHTML=t('seo');
    $('langUz').classList.toggle('on',lang==='uz');
    $('langRu').classList.toggle('on',lang==='ru');
    calc();
  }
  $('langUz').onclick=function(){lang='uz';applyLang()};
  $('langRu').onclick=function(){lang='ru';applyLang()};
  applyLang();
})();
</script>
</body>
</html>
